<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — IndieCo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<style>

:root {
  --void:      #0A0710;
  --graphite:  #211B2B;
  --voltage:   #B8244E;
  --voltage-dk:#8C1A3A;
  --orchid:    #5C2475;
  --bone:      #F4F0EB;
  --ash:       #9A8FA0;
  --font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-serif:'Cormorant Garamond', Georgia, serif;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
}

html, body { height: 100%; }

body {
  background: var(--void);
  color: var(--bone);
  font-family: var(--font-body);
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* Geometric accent — brand-aligned */
body::before {
  content: '';
  position: fixed;
  top: 0;
  right: 0;
  width: 40%;
  height: 100%;
  background: var(--graphite);
  clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0;
  right: 0;
  width: 40%;
  height: 3px;
  background: var(--voltage);
  clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
  z-index: 1;
}

/* Noise grain */
.grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  opacity: 0.02;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
}

/* Orchid glow */
.glow {
  position: fixed;
  bottom: -200px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(92,36,117,0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: drift 12s ease-in-out infinite alternate;
}

@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,20px) scale(1.08); }
}

/* Vertical rule — brand detail */
.v-rule {
  position: fixed;
  left: 80px;
  top: 0;
  width: 0.5px;
  height: 100vh;
  background: linear-gradient(to bottom, transparent 10%, rgba(184,36,78,0.3) 40%, rgba(184,36,78,0.3) 60%, transparent 90%);
  z-index: 2;
}

/* Main container */
.container {
  position: relative;
  z-index: 10;
  text-align: left;
  padding: 40px 80px;
  max-width: 600px;
  width: 100%;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Eyebrow */
.eyebrow {
  font-size: 9px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  font-weight: 400;
  color: var(--voltage);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: fadeUp 0.9s 0.1s both;
}

.eyebrow::before {
  content: '';
  display: block;
  width: 32px;
  height: 0.5px;
  background: var(--voltage);
}

/* 404 number */
.number {
  font-family: var(--font-serif);
  font-size: clamp(8rem, 22vw, 14rem);
  font-weight: 300;
  line-height: 0.88;
  letter-spacing: -0.04em;
  color: var(--bone);
  margin-bottom: 32px;
  animation: fadeUp 0.9s 0.15s both;
  position: relative;
  display: inline-block;
}

/* Ghost echo */
.number::after {
  content: '404';
  position: absolute;
  inset: 0;
  color: transparent;
  -webkit-text-stroke: 0.5px rgba(184,36,78,0.3);
  transform: translate(6px, 6px);
  pointer-events: none;
}

/* Divider */
.rule {
  width: 48px;
  height: 0.5px;
  background: var(--voltage);
  margin-bottom: 24px;
  animation: fadeUp 0.9s 0.22s both;
}

/* Headline */
h1 {
  font-family: var(--font-serif);
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.01em;
  color: var(--bone);
  margin-bottom: 12px;
  animation: fadeUp 0.9s 0.28s both;
}

/* Body */
p.body {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.05em;
  color: rgba(244,240,235,0.35);
  line-height: 1.9;
  margin-bottom: 44px;
  animation: fadeUp 0.9s 0.34s both;
}

/* Button */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: var(--voltage);
  color: var(--bone);
  padding: 16px 36px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.3s;
  animation: fadeUp 0.9s 0.4s both;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--voltage-dk);
  transform: translateX(-101%);
  transition: transform 0.45s cubic-bezier(0.7,0,0.3,1);
}

.btn:hover::before { transform: translateX(0); }
.btn span { position: relative; z-index: 1; }

/* Footnote */
.footnote {
  margin-top: 48px;
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(244,240,235,0.15);
  animation: fadeUp 0.9s 0.48s both;
}

</style>
</head>
<body>

  <div class="grain"></div>
  <div class="glow"></div>
  <div class="v-rule"></div>

  <div class="container">
    <div class="eyebrow">IndieCo — Error</div>
    <div class="number">404</div>
    <div class="rule"></div>
    <h1>This page doesn't exist.</h1>
    <p class="body">The page you're looking for has moved or never existed — but the ideas still do.</p>
    <a class="btn" href="/"><span>Return Home →</span></a>
    <div class="footnote">www.indieco.com.co · Manila · New York</div>
  </div>

</body>
</html>
